[sortbenchmark]
version = 1.0.0 (sortbenchmark)

[helper]
# 第一次运行（收集统计数据）设为 true；第二次运行（纯计时）设为 false
instrument = true
seed = 0
cutoff = 10

[instrumenting]
# 仅在 instrument = true 时生效
# inversions 设 0 以避免显著拖慢速度
showStats = true
inversions = 0
swaps    = true
compares = true
copies   = true
fixes    = false
hits     = true

[benchmarkstringsorters]
words           = 1000
runs            = 20
mergesort       = true
timsort         = false
quicksort       = false
heapsort        = true
introsort       = false
insertionsort   = false
bubblesort      = false
quicksort3way   = false
quicksortDualPivot = false
randomsort      = false

[benchmarkdatesorters]
timsort = false
n       = 100000

[mergesort]
insurance = false
nocopy    = true

[shellsort]
n = 100000

[operationsbenchmark]
nlargest    = 10000000
repetitions = 10